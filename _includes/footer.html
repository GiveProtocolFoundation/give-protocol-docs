<footer class="site-footer" role="contentinfo">
  <div class="footer-inner">
    <div class="footer-brand">
      <a href="{{ '/' | relative_url }}" class="footer-logo" aria-label="{{ site.title }}">
        <img src="{{ '/assets/images/logo.svg' | relative_url }}" alt="{{ site.title }} logo" width="28" height="28" />
        <span>{% t global.site_title %}</span>
      </a>
      <p class="footer-description">{% t global.site_description %}</p>
    </div>
    <nav class="footer-links" aria-label="{% t global.footer_navigation %}">
      <a href="https://github.com/GiveProtocol" target="_blank" rel="noopener noreferrer">
        <i class="fa-brands fa-github" aria-hidden="true"></i> {% t footer.github %}
      </a>
      <a href="{{ '/help-center/faq/' | relative_url }}">{% t footer.support %}</a>
      <a href="{{ '/safety-security/cookie-policy/' | relative_url }}">{% t footer.cookie_policy %}</a>
    </nav>
    <p class="footer-copy">{% t footer.copyright %}</p>
  </div>
</footer>
